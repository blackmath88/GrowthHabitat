<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);}
.row{display:flex;align-items:center;gap:18px;}
.bar{display:flex;flex-direction:column;align-items:center;gap:6px;}
.b{background:var(--gh-line);border-radius:2px;width:48px;}
.lb{font-family:var(--gh-mono);font-size:10px;color:var(--gh-faint);letter-spacing:.06em;}
.note{margin-left:24px;border-left:1px solid var(--gh-line);padding-left:24px;color:var(--gh-muted);font-size:13px;line-height:1.55;max-width:240px;}
</style></head>
<body>
<div class="row">
  <div class="bar"><div class="b" style="height:4px"></div><div class="lb">4</div></div>
  <div class="bar"><div class="b" style="height:8px"></div><div class="lb">8</div></div>
  <div class="bar"><div class="b" style="height:12px"></div><div class="lb">12</div></div>
  <div class="bar"><div class="b" style="height:16px"></div><div class="lb">16</div></div>
  <div class="bar"><div class="b" style="height:24px"></div><div class="lb">24</div></div>
  <div class="bar"><div class="b" style="height:32px"></div><div class="lb">32</div></div>
  <div class="bar"><div class="b" style="height:48px"></div><div class="lb">48</div></div>
  <div class="bar"><div class="b" style="height:64px"></div><div class="lb">64</div></div>
  <div class="bar"><div class="b" style="height:96px"></div><div class="lb">96</div></div>
  <div class="note">8px base. Section gaps default to 64+. Pages should feel uncrowded — that's the system.</div>
</div>
</body></html>
