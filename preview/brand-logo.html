<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);display:flex;gap:24px;align-items:center;}
.logo-stack{display:flex;flex-direction:column;gap:24px;align-items:center;padding:24px;background:var(--gh-surface);border:1px solid var(--gh-line);border-radius:8px;min-width:300px;}
.lockup{display:flex;align-items:center;gap:14px;}
.lockup svg{width:48px;height:48px;}
.wm{font-family:var(--gh-serif);font-variation-settings:"opsz" 14,"SOFT" 0,"wght" 480;font-size:24px;letter-spacing:-.015em;color:var(--gh-ink);}
.fav{display:flex;gap:14px;align-items:center;}
.fav .b{width:32px;height:32px;border-radius:6px;background:var(--gh-canvas);display:grid;place-items:center;}
.fav .b svg{width:22px;height:22px;}
.note{font-family:var(--gh-mono);font-size:10px;color:var(--gh-faint);letter-spacing:.08em;text-transform:uppercase;}
</style></head>
<body>
<div class="logo-stack">
  <div class="lockup">
    <svg viewBox="0 0 64 64" fill="none"><g stroke="#3D5A3F" stroke-width="2.4" stroke-linecap="round"><path d="M 32 50 L 32 18"/><path d="M 32 28 C 26 26 22 22 21 16 C 27 16 31 20 32 26"/><path d="M 32 36 C 38 34 42 30 43 24 C 37 24 33 28 32 34"/><path d="M 32 44 C 26 42 22 38 21 32 C 27 32 31 36 32 42"/></g></svg>
    <div class="wm">Growth Habitat</div>
  </div>
  <div class="fav">
    <div class="b"><svg viewBox="0 0 64 64" fill="none"><g stroke="#3D5A3F" stroke-width="3.5" stroke-linecap="round"><path d="M 32 50 L 32 18"/><path d="M 32 28 C 26 26 22 22 21 16 C 27 16 31 20 32 26"/><path d="M 32 36 C 38 34 42 30 43 24 C 37 24 33 28 32 34"/></g></svg></div>
    <div class="b" style="background:var(--gh-ink)"><svg viewBox="0 0 64 64" fill="none"><g stroke="#F5F1EA" stroke-width="3.5" stroke-linecap="round"><path d="M 32 50 L 32 18"/><path d="M 32 28 C 26 26 22 22 21 16 C 27 16 31 20 32 26"/><path d="M 32 36 C 38 34 42 30 43 24 C 37 24 33 28 32 34"/></g></svg></div>
    <div class="b" style="background:var(--gh-moss)"><svg viewBox="0 0 64 64" fill="none"><g stroke="#F5F1EA" stroke-width="3.5" stroke-linecap="round"><path d="M 32 50 L 32 18"/><path d="M 32 28 C 26 26 22 22 21 16 C 27 16 31 20 32 26"/><path d="M 32 36 C 38 34 42 30 43 24 C 37 24 33 28 32 34"/></g></svg></div>
    <span class="note">FAVICON · 32PX</span>
  </div>
</div>
</body></html>
