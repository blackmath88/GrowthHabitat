<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas-deep);}
.nav{width:240px;background:var(--gh-canvas-deep);border-right:1px solid var(--gh-line);padding:14px 8px;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 14px;border-bottom:1px solid var(--gh-line-soft);margin-bottom:10px;}
.mark{width:28px;height:28px;border-radius:6px;background:var(--gh-canvas);border:1px solid var(--gh-line);display:grid;place-items:center;}
.mark svg{width:18px;height:18px;}
.bt{font-family:var(--gh-serif);font-variation-settings:"opsz" 14,"SOFT" 0,"wght" 500;font-size:15px;color:var(--gh-ink);letter-spacing:-.01em;}
.eb{font-family:var(--gh-mono);font-size:10px;letter-spacing:.08em;color:var(--gh-faint);text-transform:uppercase;padding:14px 10px 6px;}
.item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;color:var(--gh-muted);font-family:var(--gh-sans);font-size:13.5px;font-weight:500;border-left:2px solid transparent;}
.item:hover{background:rgba(26,24,20,.03);color:var(--gh-ink);}
.item.on{background:var(--gh-canvas);color:var(--gh-ink);border-left-color:var(--gh-moss);}
.idx{font-family:var(--gh-mono);font-size:10.5px;color:var(--gh-faint);width:18px;}
.item.on .idx{color:var(--gh-moss);}
</style></head>
<body>
<div class="nav">
  <div class="brand"><div class="mark"><svg viewBox="0 0 64 64" fill="none"><g stroke="#3D5A3F" stroke-width="3" stroke-linecap="round"><path d="M 32 50 L 32 18"/><path d="M 32 28 C 26 26 22 22 21 16 C 27 16 31 20 32 26"/><path d="M 32 36 C 38 34 42 30 43 24 C 37 24 33 28 32 34"/><path d="M 32 44 C 26 42 22 38 21 32 C 27 32 31 36 32 42"/></g></svg></div><div class="bt">Growth Habitat</div></div>
  <div class="item on"><span class="idx">◇</span><span>Command Center</span></div>
  <div class="eb">Discovery</div>
  <div class="item"><span class="idx">01</span><span>Signal Profile</span></div>
  <div class="item"><span class="idx">02</span><span>Arena Explorer</span></div>
  <div class="item"><span class="idx">03</span><span>People &amp; Conversations</span></div>
  <div class="item"><span class="idx">04</span><span>Opportunity Fit</span></div>
  <div class="item"><span class="idx">05</span><span>Patterns &amp; Direction</span></div>
</div>
</body></html>
