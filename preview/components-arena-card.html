<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);}
.card{background:var(--gh-surface);border:1px solid var(--gh-line);border-radius:8px;box-shadow:0 1px 0 rgba(26,24,20,.04);padding:20px;display:grid;grid-template-columns:1fr auto;gap:16px;}
.eb{font-family:var(--gh-mono);font-size:11px;letter-spacing:.08em;color:var(--gh-faint);text-transform:uppercase;}
.t{font-family:var(--gh-serif);font-variation-settings:"opsz" 14,"SOFT" 0,"wght" 500;font-size:20px;color:var(--gh-ink);margin-top:6px;letter-spacing:-.01em;line-height:1.25;}
.s{font-size:13px;color:var(--gh-muted);margin-top:6px;line-height:1.55;max-width:520px;}
.meta{display:flex;gap:14px;margin-top:14px;font-family:var(--gh-mono);font-size:10.5px;color:var(--gh-muted);text-transform:uppercase;letter-spacing:.06em;}
.chip{display:inline-flex;height:22px;padding:0 8px;border-radius:999px;font-family:var(--gh-mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:#E6EBE3;color:#3D5A3F;border:1px solid #C2D0C1;align-items:center;align-self:flex-start;}
</style></head>
<body>
<div class="card">
  <div>
    <div class="eb">02 · ARENA · ACTIVE HYPOTHESIS</div>
    <div class="t">AI Adoption Consulting inside Microsoft Partner Ecosystem</div>
    <div class="s">Translator/activator strengths compound with M365 governance experience. Market pull is high; access through existing partner relationships.</div>
    <div class="meta"><span>FASCINATION 8.4</span><span>FIT 9.0</span><span>LEARNING 8.6</span><span>UPDATED 2D AGO</span></div>
  </div>
  <span class="chip">Pursue · 8.4</span>
</div>
</body></html>
