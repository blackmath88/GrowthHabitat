<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect SPA routes to index.html via query string
      const path = window.location.pathname.replace('/GrowthHabitat', '');
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        '/GrowthHabitat/?redirect=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
