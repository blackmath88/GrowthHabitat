<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:36px;padding:0 14px;border:1px solid var(--gh-line);border-radius:4px;background:var(--gh-surface);color:var(--gh-ink);font-family:var(--gh-sans);font-size:13px;font-weight:500;cursor:pointer;}
.btn-primary{background:var(--gh-moss);border-color:var(--gh-moss);color:var(--gh-canvas);}
.btn-primary:hover{background:var(--gh-moss-deep);border-color:var(--gh-moss-deep);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--gh-muted);}
.btn-sm{min-height:28px;padding:0 10px;font-size:12px;}
.row+.row{margin-top:16px;}
</style></head>
<body>
<div class="row">
  <button class="btn btn-primary">Add conversation</button>
  <button class="btn">Filter</button>
  <button class="btn btn-ghost">Cancel</button>
  <button class="btn btn-sm">Edit</button>
  <button class="btn btn-sm" style="color:var(--gh-warn);border-color:var(--gh-warn-line);background:var(--gh-warn-soft)">Avoid</button>
</div>
<div class="row">
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:999px;font-family:var(--gh-mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:#E6EBE3;color:#3D5A3F;border:1px solid #C2D0C1;">Pursue · 8.4</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:999px;font-family:var(--gh-mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:#F4ECDB;color:#9C7A3C;border:1px solid #E0D2B0;">Explore · 6.1</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:999px;font-family:var(--gh-mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:#E4E8ED;color:#5A6F8A;border:1px solid #BFCAD5;">Parked</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:999px;font-family:var(--gh-mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:#F2E0DA;color:#A14A3A;border:1px solid #DCB9AE;">Avoid · 3.2</span>
  <span style="display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:999px;font-family:var(--gh-mono);font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:#F5F1EA;color:#6B6259;border:1px solid #E3DCCF;">Active · 12</span>
</div>
</body></html>
