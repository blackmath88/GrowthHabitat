<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);display:flex;flex-direction:column;gap:14px;}
.row{display:grid;grid-template-columns:120px 1fr;align-items:baseline;gap:18px;border-bottom:1px solid var(--gh-line-soft);padding-bottom:10px;}
.row:last-child{border-bottom:0;}
.tag{font-family:var(--gh-mono);font-size:10.5px;letter-spacing:.06em;color:var(--gh-faint);text-transform:uppercase;}
.s1{font-family:var(--gh-serif);font-variation-settings:"opsz" 144,"SOFT" 50,"wght" 420;font-size:44px;line-height:1.05;color:var(--gh-ink);letter-spacing:-.02em}
.s2{font-family:var(--gh-serif);font-variation-settings:"opsz" 144,"SOFT" 50,"wght" 420;font-size:32px;color:var(--gh-ink);letter-spacing:-.015em}
.s3{font-family:var(--gh-serif);font-variation-settings:"opsz" 144,"SOFT" 50,"wght" 420;font-size:26px;color:var(--gh-ink);letter-spacing:-.01em}
.s4{font-family:var(--gh-serif);font-variation-settings:"opsz" 14,"SOFT" 0,"wght" 500;font-size:20px;color:var(--gh-ink);}
.body{font-family:var(--gh-sans);font-size:15px;color:var(--gh-ink-soft);}
.small{font-family:var(--gh-sans);font-size:13px;color:var(--gh-muted);}
</style></head>
<body>
<div class="row"><div class="tag">H1 · 44</div><div class="s1">Where signals compound</div></div>
<div class="row"><div class="tag">H2 · 32</div><div class="s2">Strongest career arena</div></div>
<div class="row"><div class="tag">H3 · 26</div><div class="s3">Buffett 10% Test</div></div>
<div class="row"><div class="tag">H4 · 20</div><div class="s4">Microsoft Partner Ecosystem</div></div>
<div class="row"><div class="tag">BODY · 15</div><div class="body">A career discovery lab for turning weak signals into direction.</div></div>
<div class="row"><div class="tag">SMALL · 13</div><div class="small">12 conversations · 4 arenas active · last updated 2 days ago</div></div>
</body></html>
