<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);display:flex;flex-direction:column;gap:14px;}
.row{display:grid;grid-template-columns:160px 1fr 56px;gap:14px;align-items:center;}
.lab{font-family:var(--gh-mono);font-size:11px;letter-spacing:.06em;color:var(--gh-ink);text-transform:uppercase;}
.rail{display:flex;gap:2px;height:6px;}
.seg{flex:1;background:var(--gh-line);border-radius:1px;}
.seg.on{background:var(--gh-moss);}
.seg.warn.on{background:var(--gh-warn);}
.val{font-family:var(--gh-mono);font-size:14px;color:var(--gh-ink);text-align:right;font-weight:500;}
.muted{color:var(--gh-faint);}
</style></head>
<body>
<div class="row"><div class="lab">FASCINATION</div><div class="rail"><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg"></div><div class="seg"></div></div><div class="val">8.4</div></div>
<div class="row"><div class="lab">STRENGTH FIT</div><div class="rail"><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg"></div></div><div class="val">9.0</div></div>
<div class="row"><div class="lab">LEARNING SPEED</div><div class="rail"><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg"></div></div><div class="val">8.6</div></div>
<div class="row"><div class="lab">ACCESS</div><div class="rail"><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg on"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div><div class="val">7.0</div></div>
<div class="row"><div class="lab muted">CREDIBILITY TODAY</div><div class="rail"><div class="seg warn on"></div><div class="seg warn on"></div><div class="seg warn on"></div><div class="seg warn on"></div><div class="seg warn on"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div><div class="val muted">5.4</div></div>
</body></html>
