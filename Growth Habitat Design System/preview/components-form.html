<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);}
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.lbl{font-family:var(--gh-mono);font-size:11px;letter-spacing:.08em;color:var(--gh-faint);text-transform:uppercase;}
.in{width:100%;border:1px solid var(--gh-line);border-radius:4px;background:var(--gh-canvas);padding:11px 12px;font:inherit;color:var(--gh-ink);font-family:var(--gh-sans);font-size:14px;outline:none;}
.in.focus{border-color:var(--gh-moss);background:#fff;box-shadow:0 0 0 3px rgba(61,90,63,.18);}
.txt{min-height:64px;}
.help{font-family:var(--gh-sans);font-size:12px;color:var(--gh-muted);}
</style></head>
<body>
<div class="field">
  <div class="lbl">Working positioning statement</div>
  <textarea class="in txt focus">I help large governance-aware organizations turn AI from policy into practice — bridging change management, copilot adoption, and workforce enablement.</textarea>
  <div class="help">First person, present tense. Falsifiable.</div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
  <div class="field" style="margin:0"><div class="lbl">Current role</div><input class="in" value="M365 Adoption Lead"/></div>
  <div class="field" style="margin:0"><div class="lbl">Desired direction</div><input class="in" placeholder="Where do your abilities compound?"/></div>
</div>
</body></html>
