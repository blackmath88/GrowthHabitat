<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--gh-canvas);}
.row{display:flex;align-items:center;gap:24px;}
.r{width:80px;height:80px;background:var(--gh-surface);border:1px solid var(--gh-line);display:flex;align-items:flex-end;justify-content:flex-start;padding:8px;}
.lb{font-family:var(--gh-mono);font-size:10px;color:var(--gh-muted);letter-spacing:.05em;}
.sh{height:80px;width:200px;border:1px solid var(--gh-line);border-radius:8px;background:var(--gh-surface);display:flex;align-items:center;justify-content:center;font-family:var(--gh-mono);font-size:10.5px;color:var(--gh-muted);letter-spacing:.06em;text-transform:uppercase;}
.s1{box-shadow:0 1px 0 rgba(26,24,20,.04);}
.s2{box-shadow:0 1px 0 rgba(26,24,20,.04),0 1px 2px rgba(26,24,20,.03);}
.s3{box-shadow:0 24px 60px rgba(26,24,20,.10),0 2px 4px rgba(26,24,20,.04);}
</style></head>
<body>
<div class="row">
  <div class="r" style="border-radius:2px"><span class="lb">2px · MICRO</span></div>
  <div class="r" style="border-radius:4px"><span class="lb">4px · CONTROL</span></div>
  <div class="r" style="border-radius:8px"><span class="lb">8px · PANEL</span></div>
  <div class="r" style="border-radius:999px;width:140px"><span class="lb">PILL</span></div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-left:8px">
    <div class="sh s1">HAIRLINE</div>
    <div class="sh s2">CARD</div>
    <div class="sh s3">MODAL</div>
  </div>
</div>
</body></html>
