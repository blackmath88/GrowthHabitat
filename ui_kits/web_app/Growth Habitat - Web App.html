<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Growth Habitat — Web App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--gh-sans);
    background: var(--gh-canvas);
    color: var(--gh-ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
  }
  h1, h2, h3, h4 {
    font-family: var(--gh-sans);
    font-weight: 600;
    color: var(--gh-ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0;
  }
  h1 { font-size: 56px; line-height: 1.04; }
  h2 { font-size: 40px; }
  h3 { font-size: 26px; letter-spacing: -0.015em; }
  h4 { font-size: 18px; letter-spacing: -0.01em; }
  p { margin: 0; line-height: 1.6; color: var(--gh-ink); }
  button { font-family: inherit; }
  ::selection { background: var(--gh-moss-soft); color: var(--gh-moss); }
  .gh-eyebrow {
    font-family: var(--gh-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gh-faint);
    font-weight: 500;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="CommandCenter.jsx"></script>
<script type="text/babel" src="SignalProfile.jsx"></script>
<script type="text/babel" src="ArenaExplorer.jsx"></script>
<script type="text/babel" src="PeopleConversations.jsx"></script>
<script type="text/babel" src="OpportunityFit.jsx"></script>
<script type="text/babel" src="PatternsDirection.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
